<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Foto</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
.btn { display: flex; flex-direction: column; align-items: center; justify-content: center; 
       width: 120px; height: 120px; border: 2px dashed #999; border-radius: 12px; 
       cursor: pointer; background: white; margin: 10px; font-size: 13px; }
.row { display: flex; flex-wrap: wrap; }
img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin: 5px; }
h3 { color: #333; margin-top: 20px; }
.ok { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>Teste de Upload de Foto</h2>
<p>Toque em cada botão e veja qual abre a câmera/galeria:</p>

<h3>Método 1 — input direto (sem JS)</h3>
<div class="row">
 <label class="btn" style="border-color:#2196F3">
  📷 Câmera<br><small>label+input</small>
  <input type="file" accept="image/*" capture="environment" style="display:none" onchange="mostrar(this,'m1c')">
 </label>
 <label class="btn" style="border-color:#9C27B0">
  🖼 Galeria<br><small>label+input</small>
  <input type="file" accept="image/*" multiple style="display:none" onchange="mostrar(this,'m1g')">
 </label>
</div>
<div id="m1c"></div><div id="m1g"></div>

<h3>Método 2 — button onclick + inp.click()</h3>
<div class="row">
 <button class="btn" style="border-color:#4CAF50" onclick="metodo2(false)">
  📷 Câmera<br><small>btn+onclick</small>
 </button>
 <button class="btn" style="border-color:#FF9800" onclick="metodo2(true)">
  🖼 Galeria<br><small>btn+onclick</small>
 </button>
</div>
<div id="m2"></div>

<h3>Método 3 — input overlay (posição absoluta)</h3>
<div class="row">
 <div style="position:relative;width:120px;height:120px">
  <div class="btn" style="width:100%;height:100%;border-color:#E91E63;margin:0">
   📷 Câmera<br><small>overlay</small>
  </div>
  <input type="file" accept="image/*" capture="environment"
   style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0"
   onchange="mostrar(this,'m3c')">
 </div>
 <div style="position:relative;width:120px;height:120px;margin:10px">
  <div class="btn" style="width:100%;height:100%;border-color:#009688;margin:0">
   🖼 Galeria<br><small>overlay</small>
  </div>
  <input type="file" accept="image/*" multiple
   style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0"
   onchange="mostrar(this,'m3g')">
 </div>
</div>
<div id="m3c"></div><div id="m3g"></div>

<script>
function mostrar(inp, divId){
 const div = document.getElementById(divId);
 div.innerHTML = '';
 Array.from(inp.files).forEach(f=>{
  const img = document.createElement('img');
  img.src = URL.createObjectURL(f);
  div.appendChild(img);
  div.innerHTML += '<p class="ok">✓ FUNCIONOU! Método: '+divId+'</p>';
 });
}

function metodo2(galeria){
 const inp = document.createElement('input');
 inp.type = 'file';
 inp.accept = 'image/*';
 if(!galeria) inp.capture = 'environment';
 if(galeria) inp.multiple = true;
 inp.style.display = 'none';
 inp.onchange = ()=>{
  const div = document.getElementById('m2');
  div.innerHTML = '';
  Array.from(inp.files).forEach(f=>{
   const img = document.createElement('img');
   img.src = URL.createObjectURL(f);
   div.appendChild(img);
  });
  div.innerHTML += '<p class="ok">✓ FUNCIONOU! Método 2 ('+( galeria?'galeria':'câmera')+')</p>';
 };
 document.body.appendChild(inp);
 inp.click();
}
</script>
</body>
</html>
