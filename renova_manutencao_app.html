<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Renova">
<meta name="theme-color" content="#C0392B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Renova — Manutenção Predial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#C0392B;--r2:#96281B;--rl:#FCE8E6;
  --dk:#161616;--sf:#F4F3EF;--cd:#FFFFFF;
  --bd:#E2DFD8;--tx:#161616;--mu:#6E6E6E;
  --gn:#1B6535;--gl:#E8F5EE;
  --bl:#1456A0;--bll:#E8F0FA;
  --am:#9A5209;--aml:#FEF0DC;
}
html,body{min-height:100%;background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--tx)}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--sf);display:flex;flex-direction:column}
.hdr{background:var(--dk);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.logo{display:flex;align-items:center;height:36px;background:#fff;border-radius:6px;padding:2px 8px}

.av{width:32px;height:32px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;cursor:pointer}
.bnav{background:var(--dk);display:flex;flex-shrink:0}
.nb{flex:1;background:none;border:none;color:#666;padding:10px 0 8px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.5px;display:flex;flex-direction:column;align-items:center;gap:3px;text-transform:uppercase}
.nb.on{color:var(--r)}
.nb svg{width:20px;height:20px}
.scr{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--cd);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;overflow:hidden}
.ch{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ct{font-weight:700;font-size:15px}
.cb{padding:14px 16px}
.sec{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--mu);text-transform:uppercase;margin-bottom:8px;margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.br{background:var(--rl);color:var(--r2)}
.bg{background:var(--gl);color:var(--gn)}
.bb{background:var(--bll);color:var(--bl)}
.ba{background:var(--aml);color:var(--am)}
.bgr{background:#eee;color:#555}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sb{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.sn{font-size:24px;font-weight:900}
.sl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.li:last-child{border-bottom:none}
.lic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.lin{flex:1;min-width:0}
.lim{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lis{font-size:11px;color:var(--mu);margin-top:1px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc{border:1.5px solid var(--bd);border-radius:10px;padding:14px 12px;cursor:pointer;background:var(--cd)}
.rc:hover,.rc.on{border-color:var(--r);background:var(--rl)}
.ri{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.rn{font-weight:700;font-size:14px}
.rd{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.4}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--mu);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:14px;color:var(--tx);background:var(--cd);outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--r)}
.fld textarea{resize:vertical;min-height:80px;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.bp{background:var(--r);color:#fff}
.bp:hover{background:var(--r2)}
.bo{background:none;border:1.5px solid var(--bd);color:var(--tx)}
.bsm{padding:8px 14px;font-size:12px;width:auto;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit}
.stepbar{background:var(--cd);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;flex-shrink:0}
.sd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all .2s}
.sd.dn{background:var(--r);color:#fff}
.sd.ac{background:var(--dk);color:#fff}
.sd.td{background:var(--bd);color:var(--mu)}
.sl2{flex:1;height:2px;margin:0 3px}
.sl2.dn{background:var(--r)}
.sl2.td{background:var(--bd)}
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--sf)}
.ci:last-child{border-bottom:none}
.cb2{width:19px;height:19px;border:1.5px solid var(--bd);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.cb2.ck{background:var(--r);border-color:var(--r)}
.ct2{font-size:12px;line-height:1.5;flex:1}
.per{font-size:10px;font-weight:700;color:var(--mu);display:block;margin-top:2px}
.ss{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--mu);padding:8px 0 4px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ps{aspect-ratio:1;border-radius:7px;border:1.5px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--sf);font-size:10px;color:var(--mu);gap:3px;position:relative;overflow:hidden}
.ps:hover{border-color:var(--r)}
.ps.fl{border:none;background:#ddd}
.mi{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--sf);border-radius:7px;margin-bottom:5px}
.mc{font-size:10px;color:var(--mu);background:var(--bd);padding:2px 6px;border-radius:3px;flex-shrink:0;font-weight:700;font-family:monospace}
.md{flex:1;font-size:12px;line-height:1.3}
.mq{width:46px;border:1px solid var(--bd);border-radius:5px;padding:5px 6px;font-size:13px;text-align:center;font-family:inherit;font-weight:700}
.ms{border:1px solid #aee4bc}
.ok{background:var(--gl)}
.hbk{background:none;border:none;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:13px;font-family:inherit}
.hbk:hover{color:#fff}
.htt{font-weight:700;font-size:15px;color:#fff;flex:1;text-align:center}
.sw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.si{width:68px;height:68px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.stl{font-size:22px;font-weight:900;margin-bottom:8px}
.sst{font-size:13px;color:var(--mu);line-height:1.6;margin-bottom:24px;max-width:280px}
.div{height:1px;background:var(--bd);margin:12px 0}
.dlb{display:flex;align-items:center;gap:10px;margin:14px 0}
.dlb span{font-size:11px;color:var(--mu);white-space:nowrap}
.dlb::before,.dlb::after{content:'';flex:1;height:1px;background:var(--bd)}
.pav{width:64px;height:64px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 12px}
</style>
</head>

function abrirCamera(callback){
 const inp = document.createElement('input');
 inp.type = 'file';
 inp.accept = 'image/*';
 inp.capture = 'environment';  // rear camera by default
 inp.style.display = 'none';
 inp.onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{ callback(ev.target.result, file.name); };
  reader.readAsDataURL(file);
 };
 document.body.appendChild(inp);
 inp.click();
 setTimeout(()=>document.body.removeChild(inp), 30000);
}

function abrirGaleria(callback){
 const inp = document.createElement('input');
 inp.type = 'file';
 inp.accept = 'image/*';
 inp.multiple = true;
 inp.style.display = 'none';
 inp.onchange = (e)=>{
  const files = Array.from(e.target.files);
  files.forEach(file=>{
   const reader = new FileReader();
   reader.onload = (ev)=>{ callback(ev.target.result, file.name); };
   reader.readAsDataURL(file);
  });
 };
 document.body.appendChild(inp);
 inp.click();
 setTimeout(()=>document.body.removeChild(inp), 30000);
}

// SUPABASE SYNC ENGINE
// ═══════════════════════════════════════════════════
const SUPA_URL = 'https://SEU_PROJETO.supabase.co';
const SUPA_KEY = 'SUA_ANON_KEY';
let supaChannel = null;

function gerarSessao(comarca, edificacao, data){
  const co = comarca.substring(0,3).toUpperCase();
  const ed = edificacao.substring(0,3).toUpperCase();
  const dt = data.replace(/\//g,'-');
  return `${co}-${ed}-${dt}`;
}

async function iniciarSync(sessao){
  if(!SUPA_URL.includes('supabase.co') || SUPA_URL.includes('SEU_PROJETO')) return;
  S.sync.sessao = sessao;
  S.sync.ativo = true;

  // broadcast channel for real-time
  supaChannel = window._supaClient?.channel(`sessao:${sessao}`, {
    config:{broadcast:{self:false}}
  });

  if(!supaChannel) return;

  supaChannel
    .on('broadcast',{event:'item_update'}, ({payload})=>{
      const {itemId, status, tecId, tecNome, ts} = payload;
      // update local state from remote
      if(!S.nr.ck[itemId] || ts > (S.sync.lockItem[itemId]?.ts||0)){
        S.nr.ck[itemId] = status;
        S.sync.lockItem[itemId] = {tecId, tecNome, ts};
      }
      R();
    })
    .on('broadcast',{event:'presenca'}, ({payload})=>{
      S.sync.tecOnline[payload.tecId] = {nome:payload.tecNome, ts:Date.now()};
      // cleanup stale after 30s
      Object.keys(S.sync.tecOnline).forEach(id=>{
        if(Date.now() - S.sync.tecOnline[id].ts > 30000) delete S.sync.tecOnline[id];
      });
      R();
    })
    .subscribe();

  // announce presence every 15s
  anunciarPresenca();
  window._presTimer = setInterval(anunciarPresenca, 15000);
}

function anunciarPresenca(){
  if(!supaChannel || !S.sync.ativo) return;
  supaChannel.send({type:'broadcast',event:'presenca',payload:{tecId:S.tec.id,tecNome:S.tec.n}});
}

async function broadcastItem(itemId, status){
  if(!supaChannel || !S.sync.ativo) return;
  const ts = Date.now();
  S.sync.lockItem[itemId] = {tecId:S.tec.id, tecNome:S.tec.n, ts};
  supaChannel.send({type:'broadcast',event:'item_update',payload:{itemId, status, tecId:S.tec.id, tecNome:S.tec.n, ts}});
  // persist to DB
  try {
    await fetch(`${SUPA_URL}/rest/v1/checklist_items`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({sessao:S.sync.sessao, item_id:itemId, status, tec_id:S.tec.id, tec_nome:S.tec.n, updated_at:new Date().toISOString()})
    });
  } catch(e){ /* offline - will sync later */ }
}

async function carregarSessao(sessao){
  if(!SUPA_URL.includes('supabase.co') || SUPA_URL.includes('SEU_PROJETO')) return;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/checklist_items?sessao=eq.${sessao}`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const rows = await res.json();
    rows.forEach(r=>{ S.nr.ck[r.item_id]=r.status; S.sync.lockItem[r.item_id]={tecId:r.tec_id,tecNome:r.tec_nome,ts:new Date(r.updated_at).getTime()}; });
    R();
  } catch(e){}
}

function encerrarSync(){
  if(supaChannel){ supaChannel.unsubscribe(); supaChannel=null; }
  if(window._presTimer){ clearInterval(window._presTimer); }
  S.sync = {sessao:"",ativo:false,tecOnline:{},lockItem:{}};
}

// DRAFT / RASCUNHO ENGINE
// ═══════════════════════════════════════════════════
const DRAFT_KEY = 'renova_drafts';

function getDrafts(){
 try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}'); }
 catch(e){ return {}; }
}

function saveDraft(){
 if(!S.nr.co||!S.nr.ed||!S.nr.tp) return;
 const key = draftKey(S.nr);
 const drafts = getDrafts();
 drafts[key] = {
  nr: JSON.parse(JSON.stringify(S.nr)),
  tec: S.tec,
  savedAt: new Date().toISOString(),
  key
 };
 localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
 // sync to supabase if online
 syncDraftToSupabase(key, drafts[key]);
}

function deleteDraft(key){
 const drafts = getDrafts();
 delete drafts[key];
 localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
}

function draftKey(nr){
 return `${nr.tp}|${nr.co}|${nr.ed}|${nr.mesRef||nr.dtIni||'sem-data'}`;
}

function draftLabel(d){
 const m = {'ose':'OSE','periodica':'Periódica','programada':'Programada','fachada':'Fachada'};
 return `${m[d.nr.tp]||d.nr.tp} — ${d.nr.ed}, ${d.nr.co}`;
}

function draftProgress(d){
 if(d.nr.tp!=='periodica') return null;
 const g = d.nr.gr||'A';
 const sis = AB[g]||[];
 const all = sis.flatMap(s=>s.ss.flatMap(ss=>ss.it));
 const done = all.filter(it=>d.nr.ck[it.id]).length;
 return {done, total:all.length, pct:all.length>0?Math.round(done/all.length*100):0};
}

function resumeDraft(draft){
 console.log('resumeDraft called:', draft);
 if(!draft||!draft.nr){console.error('Invalid draft');return;}
 S.nr = JSON.parse(JSON.stringify(draft.nr));
 // keep current logged-in tech, don't override with draft tech
 // S.tec = draft.tec||S.tec;
 S.tab = 'new';
 // restore to step 0 always — safer
 S.nr.step = 0;
 startAutoSave();
 R();
}

async function syncDraftToSupabase(key, draft){
 if(!SUPA_URL.includes('supabase.co')||SUPA_URL.includes('SEU_PROJETO')) return;
 try{
  await fetch(`${SUPA_URL}/rest/v1/drafts`,{
   method:'POST',
   headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'resolution=merge-duplicates'},
   body:JSON.stringify({draft_key:key, data:JSON.stringify(draft), updated_at:new Date().toISOString()})
  });
 }catch(e){}
}

// auto-save every 30s when report is open
let _autoSaveTimer = null;
function startAutoSave(){ 
 stopAutoSave();
 _autoSaveTimer = setInterval(()=>{ if(S.tab==='new'&&S.nr.tp&&S.nr.co) saveDraft(); }, 30000);
}
function stopAutoSave(){ if(_autoSaveTimer){clearInterval(_autoSaveTimer);_autoSaveTimer=null;} }

// check if draft exists for a comarca+edificacao
function hasDraft(co, ed, tp){
 const drafts = getDrafts();
 return Object.values(drafts).find(d=>d.nr.co===co&&d.nr.ed===ed&&(tp?d.nr.tp===tp:true));
}

function R(){
 const app=document.getElementById('app');
 app.innerHTML='';
 app.style.background='';
 app.style.pointerEvents='';
 // Reset login state if needed
 if(!LS) LS={step:'select',tecId:null,pin:'',adminUser:'',adminPin:'',erro:''};
 // try restore session from localStorage
 if(!S.auth.logado){
  try{
   const sess=JSON.parse(localStorage.getItem('renova_session')||'null');
   if(sess&&(Date.now()-sess.ts)<8*60*60*1000){  // 8 hour session
    if(sess.role==='admin'){
     S.auth={logado:true,role:'admin',usuario:'Admin'};
     S.tec=TECS.find(t=>t.id===8)||TECS[0];
    } else if(sess.tecId){
     const t=TECS.find(t=>t.id===sess.tecId);
     if(t){S.auth={logado:true,role:'executor',usuario:t.n};S.tec=t;}
    }
   }
  }catch(e){}
 }
 if(!S.auth.logado){renderLogin(app);return;}
 if(S.tab==='success'){renderSuccess(app);return;}
 if(S.tab==='new'&&S.nr.tp&&S.nr.step>=0){renderFlow(app);return;}
 renderShell(app);
}

// STEP SERVICOS — OSE (simple) / PROGRAMADA (full OSP flow)
function stepServicos(){
 try {
 const nr=S.nr; const d=h('div');

 if(nr.tp==='programada'){
  // ── OSP FLOW ──────────────────────────────────────
  d.innerHTML='<div style="font-size:17px;font-weight:900;margin-bottom:4px">Dados da OS Programada</div><div style="font-size:12px;color:var(--mu);margin-bottom:14px">Cole o texto do email da OS para preenchimento automático</div>';

  // PASTE OS EMAIL
  const pasteCard=h('div','card');
  const pasteBody=h('div','cb');
  pasteBody.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--mu);margin-bottom:6px">📧 COLAR TEXTO DO EMAIL DA OS</div>';
  const pasteTA=document.createElement('textarea');
  pasteTA.value=nr.ospTexto||'';
  pasteTA.rows=4;
  pasteTA.placeholder='Cole aqui o conteúdo do email da OS recebida...\nEx: OS 022 - João Pinheiro - Fórum\nObjetivo: Realizar manutenção do sistema de bombeamento...';
  pasteTA.style.cssText='width:100%;border:1px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;resize:vertical;outline:none;margin-bottom:8px';
  pasteTA.oninput=e=>{S.nr.ospTexto=e.target.value;};

  const parseBtn=h('button','btn bp','⚡ Extrair dados automaticamente');
  parseBtn.style.cssText='padding:10px;font-size:13px;font-weight:700;width:100%;margin-bottom:4px';
  parseBtn.onclick=()=>{
   const txt=S.nr.ospTexto||'';
   if(!txt.trim()){alert('Cole o texto do email primeiro.');return;}

   // Extract OS number
   const numMatch=txt.match(/OS[\s\-#nN°º\.]*([\d]+)/i)||txt.match(/(\d{3,})/);
   if(numMatch) S.nr.numOS=numMatch[1];

   // Extract comarca
   const coMatch=txt.match(/comarca[:\s]+([\w\s]+?)(?:\n|\r|edifica|fórum|forum|-|$)/i);
   if(coMatch){
    const coGuess=coMatch[1].trim().split(/\s+/).slice(0,3).join(' ');
    const found=COMARCAS.find(c=>c.toLowerCase().includes(coGuess.toLowerCase())||coGuess.toLowerCase().includes(c.toLowerCase().substring(0,5)));
    if(found){S.nr.co=found;S.nr.ed='';S.nr.gr='';}
   }

   // Extract edificação
   const edMatch=txt.match(/edifica[çc][aã]o[:\s]+([\w\s]+?)(?:\n|\r|objetivo|endere|-|$)/i)
    ||txt.match(/(f[óo]rum|cejusc|jesp|arquivo|posto)/i);
   if(edMatch){
    const edGuess=edMatch[1]||edMatch[0];
    const edifs=getEdifs(S.nr.co||'');
    const found=edifs.find(e=>e.toLowerCase().includes(edGuess.toLowerCase().trim().substring(0,5)));
    if(found){S.nr.ed=found;S.nr.gr=getGrupo(S.nr.co,found);}
   }

   // Extract objetivo
   const objMatch=txt.match(/objetivo[:\s]+([^\n\r]+)/i)
    ||txt.match(/objeto[:\s]+([^\n\r]+)/i)
    ||txt.match(/servi[çc]o[:\s]+([^\n\r]+)/i);
   if(objMatch) S.nr.obj=objMatch[1].trim();

   R();
   alert('✓ Dados extraídos! Revise os campos abaixo e corrija se necessário.');
  };

  pasteBody.append(pasteTA,parseBtn);
  pasteCard.appendChild(pasteBody);
  d.appendChild(pasteCard);

  // FIELDS — auto-filled, editable
  d.innerHTML+='<div style="font-size:13px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--mu);margin:14px 0 10px;padding-top:12px;border-top:1px solid var(--bd)">Dados Extraídos / Confirmação</div>';

  // num OS
  const fros=h('div','fld','<label>Número da OS Programada</label>');
  const osInp=document.createElement('input');
  osInp.type='text'; osInp.value=nr.numOS||''; osInp.placeholder='Ex: 022';
  osInp.style.cssText='width:100%;border:1px solid var(--bd);border-radius:7px;padding:9px 12px;font-size:16px;font-weight:900;font-family:inherit;outline:none;letter-spacing:1px';
  osInp.oninput=e=>{S.nr.numOS=e.target.value;};
  fros.appendChild(osInp);
  d.appendChild(fros);

  // comarca + edificacao (if not already set in step 0)
  if(!nr.co){
   d.appendChild(sel('Comarca',COMARCAS,nr.co,v=>{S.nr.co=v;S.nr.ed='';S.nr.gr='';R();}));
  } else {
   const comDiv=h('div','fld');
   comDiv.innerHTML=`<label>Comarca</label><div style="background:var(--gl);border:1px solid var(--gn);border-radius:7px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--gn)">${nr.co} ✓</div>`;
   d.appendChild(comDiv);
  }
  if(nr.co&&!nr.ed){
   d.appendChild(sel('Edificação',getEdifs(nr.co),nr.ed,v=>{S.nr.ed=v;S.nr.gr=getGrupo(S.nr.co,v);R();}));
  } else if(nr.ed){
   const edDiv=h('div','fld');
   edDiv.innerHTML=`<label>Edificação — Grupo ${nr.gr}</label><div style="background:var(--gl);border:1px solid var(--gn);border-radius:7px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--gn)">${nr.ed} ✓</div>`;
   d.appendChild(edDiv);
  }

  d.appendChild(ta('Objetivo / Descrição dos serviços',nr.obj,v=>{S.nr.obj=v;}));
  d.appendChild(ta('Possíveis causas dos danos',nr.cau,v=>{S.nr.cau=v;}));
  d.appendChild(inp('Limitações técnicas',nr.lim,'text',v=>{S.nr.lim=v;}));
  d.appendChild(ta('Normas pertinentes',nr.nor,v=>{S.nr.nor=v;}));

 } else {
  // ── OSE FLOW (simple) ──────────────────────────────
  d.innerHTML='<div style="font-size:17px;font-weight:900;margin-bottom:14px">Serviços e Atividades</div>';
  d.appendChild(ta('Atividades desenvolvidas durante o atendimento',nr.atv,v=>{S.nr.atv=v;}));
  d.appendChild(ta('Limitações técnicas',nr.lim,v=>{S.nr.lim=v;}));
  d.appendChild(ta('Normas pertinentes',nr.nor,v=>{S.nr.nor=v;}));
  d.appendChild(ta('Possíveis causas dos danos',nr.cau,v=>{S.nr.cau=v;}));
 }
  return d;
 } catch(e) {
  console.error("stepServicos error:", e);
  const ed=h('div');
  ed.style.cssText='padding:20px;color:red;font-size:13px;font-weight:700';
  ed.textContent='Erro: '+e.message;
  return ed;
 }

 const nr=S.nr; const m=TM[nr.tp];
 const d=h('div');
 const ids={ose:'OSE',periodica:'PER',programada:'OSP',fachada:'FAC',spda:'SPDA'};
 const num=nr.tp==='programada'&&nr.numOS?'OSP-'+nr.numOS.padStart(3,'0'):ids[nr.tp]+'-'+(HIST.length+1).toString().padStart(3,'0');
 const done=Object.values(nr.ck).filter(Boolean).length;
 d.innerHTML=`<div style="font-size:17px;font-weight:900;margin-bottom:14px">Revisar e Concluir</div>`;
 const sum=h('div','card',`<div class="ch"><span class="ct">${num}</span><span class="badge ${m.bk}">${m.ic} ${m.l}</span></div><div class="cb"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px"><div><span style="color:var(--mu)">Comarca</span><br><b>${nr.co||'—'}</b></div><div><span style="color:var(--mu)">Edificação</span><br><b>${nr.ed||'—'}</b></div><div><span style="color:var(--mu)">Grupo</span><br><b>Grupo ${nr.gr||'—'}</b></div><div><span style="color:var(--mu)">Data</span><br><b>${nr.dt}</b></div><div><span style="color:var(--mu)">Responsável</span><br><b>${S.tec.n.split(' ')[0]}</b></div><div><span style="color:var(--mu)">Materiais</span><br><b>${nr.mats.length} itens</b></div></div>${nr.tp==='periodica'?`<div class="div"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--mu)">Conformes</span><span class="badge bg">${Object.values(nr.ck).filter(v=>v==='C').length} itens</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--mu)">Não Conformes</span><span class="badge ${Object.values(nr.ck).filter(v=>v==='N').length>0?'br':'bgr'}">${Object.values(nr.ck).filter(v=>v==='N').length} itens</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--mu)">Não Aplicável</span><span class="badge bgr">${Object.values(nr.ck).filter(v=>v==='A').length} itens</span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px"><span style="color:var(--mu)">Não Executado</span><span class="badge ba">${Object.values(nr.ck).filter(v=>v==='E').length} itens</span></div>`:''}</div>`);
 d.appendChild(sum);
 d.appendChild(ta('Conclusão / Considerações finais',nr.ccl||nr.tp==='programada'?`Após o diagnóstico das anomalias identificadas, foram executados os procedimentos corretivos conforme as boas práticas de manutenção. Concluídos os serviços, o sistema apresentou desempenho satisfatório, atendendo aos critérios operacionais exigidos. Dessa forma, declara-se finalizada a Ordem de Serviço Programada (OSP) nº ${nr.numOS||'___'}, com o restabelecimento pleno das condições de funcionamento.`:'Considerando a execução dos serviços e os resultados obtidos, atesta-se a eficácia das intervenções realizadas.',v=>{S.nr.ccl=v;}));
 // docs
 const dc=h('div','card','');
 dc.innerHTML=`<div class="ch"><span class="ct">Documentos gerados automaticamente</span></div><div class="cb" style="padding:8px 16px"><div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:18px">📄</span><div style="flex:1"><div style="font-size:13px;font-weight:600">Relatório ${m.l}</div><div style="font-size:11px;color:var(--mu)">PDF completo com fotos e assinatura</div></div><span class="badge bg">Auto</span></div><div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:18px">📋</span><div style="flex:1"><div style="font-size:13px;font-weight:600">RATE</div><div style="font-size:11px;color:var(--mu)">Documento separado — Atividades Executadas</div></div><span class="badge bg">Auto</span></div>${nr.mats.length?`<div style="display:flex;align-items:center;gap:10px;padding:8px 0"><span style="font-size:18px">📊</span><div style="flex:1"><div style="font-size:13px;font-weight:600">Planilha Orçamentária</div><div style="font-size:11px;color:var(--mu)">${nr.mats.length} itens do Anexo H</div></div><span class="badge bg">Auto</span></div>`:''}</div>${(nr.anexos||[]).length>0?`<div style="display:flex;align-items:center;gap:10px;padding:8px 0"><span style="font-size:18px">📎</span><div style="flex:1"><div style="font-size:13px;font-weight:600">Anexos</div><div style="font-size:11px;color:var(--mu)">${(nr.anexos||[]).length} arquivo${(nr.anexos||[]).length!==1?"s":""} incluído${(nr.anexos||[]).length!==1?"s":""}</div></div><span class="badge bg">Incluído</span></div>`:""}</div>`;
 d.appendChild(dc);
 // envio
 const ec=h('div','card','');
 ec.innerHTML=`<div class="ch"><span class="ct">Envio automático</span></div><div class="cb" style="padding:8px 16px"><div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px"><span>📧</span> E-mail para gestão TJMG</div><div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px"><span>☁️</span> Google Drive — pasta da comarca</div><div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px"><span>${S.offline?'⏳':'✅'}</span> ${S.offline?'Aguardando conexão para envio':'Envio imediato ao finalizar'}</div></div>`;
 d.appendChild(ec);
 // btn
 // check completion — all types
 const allIt=(AB[nr.gr||'A']||[]).flatMap(s=>s.ss.flatMap(ss=>ss.it));
 const totalIt=allIt.length;
 const avalIt=allIt.filter(it=>nr.ck[it.id]).length;

 // define pendencias by type
 let pendencias=[];
 let isComplete=false;

 if(nr.tp==='periodica'){
  const pendentes=totalIt-avalIt;
  isComplete=(totalIt>0&&avalIt===totalIt);
  if(!isComplete) pendencias.push({label:'Checklist',detail:`${pendentes} item${pendentes!==1?'s':''} sem avaliação`});

 } else if(nr.tp==='ose'){
  if(!nr.atv||nr.atv.trim().length<10) pendencias.push({label:'Atividades realizadas',detail:'Campo obrigatório (mín. 10 caracteres)'});
  if(!nr.cau||nr.cau.trim().length<5)  pendencias.push({label:'Causas dos danos',detail:'Campo obrigatório'});
  if(!nr.ccl||nr.ccl.trim().length<5)  pendencias.push({label:'Conclusão',detail:'Campo obrigatório'});
  const fotosGer=(nr.ft['ger']||[]).length;
  const fotosDan=(nr.ft['dan']||[]).length;
  if(fotosGer<4) pendencias.push({label:'Fotos — Registro Geral',detail:`${fotosGer}/4 fotos (mínimo 4)`});
  if(fotosDan<2) pendencias.push({label:'Fotos — Danos Identificados',detail:`${fotosDan}/2 fotos (mínimo 2)`});
  isComplete=pendencias.length===0;

 } else if(nr.tp==='programada'){
  if(!nr.numOS||!nr.numOS.trim()) pendencias.push({label:'Número da OS',detail:'Informe o número da OS Programada'});
  if(!nr.obj||nr.obj.trim().length<10) pendencias.push({label:'Objetivo/Descrição',detail:'Campo obrigatório (mín. 10 caracteres)'});
  if(!nr.ccl||nr.ccl.trim().length<5)  pendencias.push({label:'Conclusão',detail:'Campo obrigatório'});
  const fotosInsp2=(nr.ft['insp']||[]).length;
  const fotosExec2=(nr.ft['exec']||[]).length;
  if(fotosInsp2<2) pendencias.push({label:'Fotos — Inspeção/Diagnóstico',detail:`${fotosInsp2}/2 fotos mínimo`});
  if(fotosExec2<2) pendencias.push({label:'Fotos — Execução dos Serviços',detail:`${fotosExec2}/2 fotos mínimo`});
  isComplete=pendencias.length===0;

  } else if(nr.tp==='fachada'){
  const faces=[
   {k:'fr',label:'Fachada Frontal',min:4},
   {k:'ld',label:'Lateral Direita',min:4},
   {k:'le',label:'Lateral Esquerda',min:4},
   {k:'fu',label:'Fundos',min:4},
  ];
  faces.forEach(({k,label,min})=>{
   const n=(nr.ft[k]||[]).length;
   if(n<min) pendencias.push({label:`Fotos — ${label}`,detail:`${n}/${min} fotos`});
  });
  if(!nr.fac.iv||nr.fac.iv.trim().length<5) pendencias.push({label:'Inspeção Visual',detail:'Campo obrigatório'});
  if(!nr.fac.ae||nr.fac.ae.trim().length<5) pendencias.push({label:'Análise Estrutural',detail:'Campo obrigatório'});
  if(!nr.fac.ap||nr.fac.ap.trim().length<5) pendencias.push({label:'Análise de Patologias',detail:'Campo obrigatório'});
  if(!nr.fac.as||nr.fac.as.trim().length<5) pendencias.push({label:'Análise de Segurança',detail:'Campo obrigatório'});
  if(!nr.ccl||nr.ccl.trim().length<5)       pendencias.push({label:'Conclusão',detail:'Campo obrigatório'});
  isComplete=pendencias.length===0;
 }

 const pendentes=pendencias.length;

 if(!isComplete){
  // BLOCKED — show what's missing
  const blockCard=h('div','card');
  blockCard.style.cssText='border:1.5px solid var(--am);margin-top:16px;overflow:hidden';
  const blockHead=h('div');
  blockHead.style.cssText='background:var(--aml);padding:12px 16px;display:flex;align-items:center;gap:10px';
  blockHead.innerHTML=`<span style="font-size:20px">🔒</span><div><div style="font-size:14px;font-weight:900;color:var(--am)">Relatório incompleto</div><div style="font-size:12px;color:var(--am);margin-top:1px">${pendentes} pendência${pendentes!==1?'s':''} para finalizar</div></div>`;
  blockCard.appendChild(blockHead);
  const blockBody=h('div');
  blockBody.style.padding='12px 16px';

  // progress bar for periodica
  if(nr.tp==='periodica'){
   const pct=totalIt>0?Math.round(avalIt/totalIt*100):0;
   blockBody.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--mu)">Progresso do checklist</span><span style="font-weight:700">${avalIt}/${totalIt} (${pct}%)</span></div><div style="height:6px;background:var(--bd);border-radius:3px;margin-bottom:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--gn);border-radius:3px;transition:width .3s"></div></div>`;
   // list pending systems for periodica
   (AB[nr.gr||'A']||[]).forEach(s=>{
    const pendS=s.ss.flatMap(ss=>ss.it).filter(it=>!nr.ck[it.id]);
    if(pendS.length>0){
     const row=h('div');
     row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid var(--bd);font-size:12px';
     row.innerHTML=`<span>${s.s}</span><span class="badge br">${pendS.length} item${pendS.length!==1?'s':''}</span>`;
     blockBody.appendChild(row);
    }
   });
  } else {
   // list pendencias for other types
   pendencias.forEach((p,i)=>{
    const row=h('div');
    row.style.cssText=`display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;${i>0?'border-top:1px solid var(--bd)':''}`;
    row.innerHTML=`<div><div style="font-size:12px;font-weight:600">${p.label}</div><div style="font-size:11px;color:var(--mu);margin-top:1px">${p.detail}</div></div><span style="font-size:16px;flex-shrink:0;margin-left:8px">⚠️</span>`;
    blockBody.appendChild(row);
   });
  }
  blockCard.appendChild(blockBody);

  // navigate to the right step
  const stepMap={ose:1,programada:1,fachada:1,periodica:1};
  const goBtn=h('button','btn bp',nr.tp==='periodica'?'→ Ir para o Checklist':'→ Completar pendências');
  goBtn.style.cssText='margin:0 16px 16px;width:calc(100% - 32px);padding:11px;font-size:14px;font-weight:700';
  goBtn.onclick=()=>{S.nr.step=nr.tp==='periodica'?2:(stepMap[nr.tp]||1);saveDraft();R();};
  blockCard.appendChild(goBtn);
  d.appendChild(blockCard);

  // save and exit
  const saveBtn=h('button','btn bo','💾 Salvar rascunho e sair');
  saveBtn.style.marginTop='10px';
  saveBtn.onclick=()=>{saveDraft();S.tab='home';stopAutoSave();R();};
  d.appendChild(saveBtn);

 } else {
  // UNLOCKED — show finalize button
   const doneCard=h('div');
  doneCard.style.cssText='background:var(--gl);border:1.5px solid var(--gn);border-radius:9px;padding:12px 14px;margin-top:16px;display:flex;align-items:center;gap:10px';
  doneCard.innerHTML=`<span style="font-size:22px">✅</span><div><div style="font-size:14px;font-weight:900;color:var(--gn)">Relatório completo!</div><div style="font-size:12px;color:var(--gn);margin-top:1px">Todas as pendências foram resolvidas. Pronto para envio.</div></div>`;
  d.appendChild(doneCard);
  const btn=h('button','btn bp','✓ Finalizar e Enviar Relatório'); btn.style.marginTop='16px';
  btn.onclick=()=>{
   HIST.unshift({id:num,tp:nr.tp,co:nr.co,ed:nr.ed,dt:nr.dt||nr.dtIni||new Date().toLocaleDateString('pt-BR'),st:S.offline?'rascunho':'enviado',numOS:nr.numOS||''});
   deleteDraft(draftKey(nr));
   stopAutoSave();
   S.nr={tp:null,step:0,co:'',ed:'',gr:'',ct:'017/2026',dtIni:'',dtFim:'',dtRev:'',rev:'00',mesRef:'',supv:'',rtCivil:'',rtCivilCrea:'',rtElet:'',rtEletCrea:'',eq:[],obj:'',numOS:'',ospTexto:'',atv:'',lim:'Não houve.',nor:'NBR 5674 - MANUTENÇÃO DE EDIFICAÇÕES - PROCEDIMENTOS.',cau:'',ccl:'',ck:{},ckTarefa:{},ft:{},ftNC:{},mats:[],msi:{},sb:{},fac:{fr:'',ld:'',le:'',fu:'',iv:'',ae:'',am:'',ap:'',as:'',rc:''},op:{},_eqExtra:[],spda:{descEdif:'',instrumento:'Micro-ohmímetro Digital 10A – INSTRUM',dtRevisao:'',dtCalib:'',certFile:null,certFileName:'',checklist:{},pontos:{p1:'',p2:'',p3:'',bep:''},fotosPontos:{p1:[],p2:[],p3:[],bep:[]},fotosGeral:[],ncObs:'',parecer:''}};encerrarSync();
   S.tab='success'; R();
  };
  d.appendChild(btn);

  // also offer save draft
  const saveBtn2=h('button','btn bo','💾 Salvar e continuar depois');
  saveBtn2.style.marginTop='8px';
  saveBtn2.onclick=()=>{saveDraft();S.tab='home';stopAutoSave();R();};
  d.appendChild(saveBtn2);
 }
  return d;
 } catch(e) {
  console.error("stepConcluir error:", e);
  const ed=h('div');
  ed.style.cssText='padding:20px;color:red;font-size:13px;font-weight:700';
  ed.textContent='Erro: '+e.message;
  return ed;
 }
}
function renderSuccess(app){
 const hdr=h('div','hdr','<div class="logo">RE<b>NO</b>VA</div>');
 app.appendChild(hdr);
 const sw=h('div','sw');
 sw.innerHTML=`<div class="si"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--gn)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stl">Relatório Enviado!</div><div class="sst">${S.offline?'Salvo localmente. Será sincronizado ao reconectar.':'Relatório, RATE e planilha enviados ao Google Drive e por e-mail para a gestão TJMG.'}</div>`;
 const b1=h('button','btn bp','Voltar ao Início'); b1.style.maxWidth='260px'; b1.onclick=()=>{S.tab='home';R();};
 const b2=h('button','btn bo','Ver Relatórios'); b2.style.cssText='max-width:260px;margin-top:10px'; b2.onclick=()=>{S.tab='historico';R();};
 sw.append(b1,b2); app.appendChild(sw);
}

R();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js')

  });
